<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<title>Entrar</title>

	<link rel="icon" href="images/logo.png" type="image/x-icon">

	<style>
		body {
			background-image: url('images/afrape fundo.png');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			min-height: 100vh;
		}
	</style>
</head>

<body class="text-white">

	<div class="container-fluid min-vh-100 d-flex align-items-center px-5">
		<div class="d-flex align-items-center ms-5">
			<div>
				<h3 class="text-dark me-3"
					style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 70px; margin-left: 50px;">
					Bem-vindo(a)!
				</h3>
			</div>

			<div style="max-width: 500px; width: 100%; margin-left: 300px;">
				<form id="loginForm" class="shadow p-4 rounded text-dark"
					style="background-color: rgba(255, 255, 255, 0.2);">
					<div class="mb-3">
						<label class="form-label text-dark">E-mail:</label>
						<input type="email" class="form-control" id="email" required>
					</div>

					<div class="mb-3">
						<label class="form-label text-dark">Senha:</label>
						<input type="password" class="form-control" id="senha" required>
					</div>

					<div class="d-flex justify-content-end mt-4">
						<button type="submit" class="btn btn-dark" style="width: 30%; height: 40px;">Entrar</button>
					</div>
				</form>

				<div class="mt-4">
					<footer class="text-center text-dark">
						<p>Desenvolvido por PI UNIVESP</p>
					</footer>
				</div>
			</div>
		</div>
	</div>

	<script>
		document.getElementById('loginForm').addEventListener('submit', function (e) {
			e.preventDefault(); // evita o envio tradicional

			// Pegando os valores
			const email = document.getElementById('email').value.trim();
			const senha = document.getElementById('senha').value.trim();

			// Simulando validação
			if (email === '' || senha === '') {
				alert('Por favor, preencha todos os campos.');
				return;
			}

			// Aqui poderia fazer validação real com backend...

			// Se for válido, redireciona para a página inicial
			window.location.href = 'telaprincipal.html';
		});
	</script>

</body>

</html>
